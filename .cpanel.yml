---
# cPanel Git Version Control deploy (nincs SSH/Terminal).
# A "Pull or Deploy → Deploy HEAD" gomb futtatja: minden lépést a
# deploy/cpanel-deploy.sh végez (Composer telepítés + függőségek + migráció + seed).
deployment:
  tasks:
    - export DEPLOYPATH=/home/elitediv/zsolti-crm
    - /bin/bash "$DEPLOYPATH/deploy/cpanel-deploy.sh"

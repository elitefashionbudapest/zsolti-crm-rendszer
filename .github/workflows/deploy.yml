name: Deploy to tárhely.eu (SSH)

# MEGJEGYZÉS: jelenleg cPanel Git Version Control + .cpanel.yml a deploy útja.
# Ez az SSH-alapú auto-deploy KÉZI indítású, amíg nincsenek beállítva az SSH-titkok
# (SSH_HOST/USER/PORT/KEY/APP_DIR). Ha lesz SSH-kulcs, a push-trigger visszakapcsolható.

on:
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: |
            cd ${{ secrets.APP_DIR }}
            bash deploy/deploy-remote.sh

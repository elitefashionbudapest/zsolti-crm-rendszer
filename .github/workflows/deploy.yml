name: Deploy to tárhely.eu

# Automatikus deploy: minden main-re érkező push után SSH-n lefuttatja a
# szerveren a deploy-remote.sh-t (git pull + composer + migrációk).
# Így nem kell kézzel deployolni — elég pusholni (vagy a ./deploy.sh).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: |
            cd ${{ secrets.APP_DIR }}
            bash deploy/deploy-remote.sh
